server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:db_pedidos}:${DB_PORT:3306}/${DB_NAME:db_pedidos}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    root: INFO
    com.SistemaDeReserva.mspedidos: INFO
